# ============================================================================
# CDM Redirects: blindagem da loja contra exposicao de URLs do front
# ============================================================================
# Path do arquivo: /var/www/ciadasmochilas.com.br/conf/nginx/cia-redirects.conf
# Carregado por: /etc/nginx/sites-available/ciadasmochilas.com.br via wildcard
#                `include /var/www/.../conf/nginx/*.conf` (gerenciado pelo WordOps)
# Ordem de include: alfabetica — este arquivo (cia-*) vem ANTES do w3tc.conf,
#                   GARANTINDO que nossos redirects rodem ANTES do W3TC rewrite.
#
# Documentacao completa: cia-astro-theme/docs/ARCHITECTURE.md secao "Routing"
# Mantenedor: Studio Visual / Tyber.io
# Criado: 2026-05-22
# ============================================================================
#
# CONTEXTO
# --------
# Arquitetura headless:
#   - Vitrine: https://ciadasmochilas.com.br (Astro/CF Pages) — serve TODO o front
#   - Loja:    https://loja.ciadasmochilas.com.br (WP/Hetzner) — serve APENAS:
#       * REST API (/wp-json/*)
#       * Admin (/wp-admin, /wp-login.php, /wp-cron.php)
#       * Fluxos dinamicos WC (/carrinho, /finalizar-compra, /minha-conta, /rastrear-pedido)
#       * Assets (/wp-content/*, /wp-includes/*, /favicon.ico, /robots.txt, /sitemap*)
#
# Sem este arquivo, a loja respondia tambem URLs do front:
#   * /produto/<slug>          -> 200 (PDP duplicada, canibaliza SEO da vitrine)
#   * /categoria/<slug>        -> 500 (UX horrivel, expoe stack trace)
#   * /marca/<slug>            -> 500
#   * /loja/, /blog/, /sobre/  -> 500 ou 404
#   * /favoritos               -> 404 (alias quebrado — devia ser /minha-conta/favoritos/)
#
# QUALQUER outra URL na loja e "vazamento": Google indexa errado, usuario erra
# digitacao, link legacy de email, etc. Este arquivo redireciona 301 (permanente)
# pra vitrine. 301 e' chave: Google atualiza indice automaticamente.
#
# POR QUE `if ($request_uri ~ ...)` E NAO `location ~`?
# ------------------------------------------------------
# W3TC tem um `rewrite .* "/wp-content/cache/..." last;` em SERVER level
# (vide w3tc.conf, "BEGIN W3TC Page Cache core"). Server-level rewrites
# rodam na "rewrite phase" do nginx, ANTES do location matching ("find
# config phase"). Pra URLs com cache (ex: /produto/<slug>), o W3TC reescreve
# a URI pra /wp-content/cache/... e nosso `location ~ ^/produto` nunca seria
# avaliado — ja foi reescrito.
#
# Solucao: usar `if ($request_uri ~ ...)` que tambem roda na rewrite phase.
# Como cia-redirects.conf e' incluido ANTES de w3tc.conf (alfabetico),
# nossos ifs disparam primeiro. `return 301` interrompe a request antes
# do W3TC ter chance de reescrever.
#
# (PS: "if is evil" do nginx wiki refere-se a `if` em LOCATION context com
# operacoes complexas. `if` em SERVER context com `return` e' oficialmente
# documentado e seguro.)
#
# COMO ADICIONAR REGRA NOVA
# -------------------------
#   * Path com prefixo (ex: /minha-secao/*) -> `if ($request_uri ~ ^/minha-secao/)`
#   * URL exata (ex: /typo)                 -> `if ($request_uri = /typo)`
#   * Apos editar: sudo nginx -t && sudo systemctl reload nginx
# ============================================================================


# ============================================================================
# SECTION 0: Redirects especificos legacy (devem vir ANTES dos catch-all)
# ============================================================================

# Categoria "Dia do Consumidor" encerrada (campanha 2026) -> renomeada pra "Ofertas".
# Esta regra SUBSTITUI o cdm-301-redirects.php (mu-plugin) pra rodar antes
# do PHP — mais performante. O mu-plugin pode ser removido depois de validar.
if ($request_uri ~ ^/categoria/dia-do-consumidor) {
    return 301 https://ciadasmochilas.com.br/categoria/ofertas/;
}


# ============================================================================
# SECTION 1: Front paths catch-all (catalogo + conteudo) -> vitrine
# ============================================================================

# Catalogo WC: produtos, categorias (slug atual + slug legacy), marcas
# Vitrine serve essas rotas via src/pages/{produto,categoria,marca}/[slug].astro
if ($request_uri ~ ^/(produto|categoria|categoria-produto|marca)/) {
    return 301 https://ciadasmochilas.com.br$request_uri;
}

# Landings de catalogo (paginas indice)
# Vitrine: src/pages/{marcas,loja,promocoes,busca}.astro
if ($request_uri ~ ^/(marcas|loja|shop|promocoes|busca)/?(\?.*)?$) {
    return 301 https://ciadasmochilas.com.br$request_uri;
}

# Blog (index + posts individuais)
# Vitrine: src/pages/blog/{index,[slug]}.astro
if ($request_uri ~ ^/blog(/|$)) {
    return 301 https://ciadasmochilas.com.br$request_uri;
}

# Guias / conteudo editorial
# Vitrine: src/pages/guia/*.astro
if ($request_uri ~ ^/guia(/|$)) {
    return 301 https://ciadasmochilas.com.br$request_uri;
}

# Pages WP institucionais — vitrine serve via src/pages/[slug].astro
# (catch-all que puxa WP pages e gera rotas estaticas no build).
#
# Lista canonica (cross-check com `wp post list --post_type=page`):
#   contato, quem-somos, como-comprar, trocas-e-devolucoes, prazo-e-entrega,
#   politica-de-privacidade-2, termos-de-uso
if ($request_uri ~ ^/(contato|quem-somos|como-comprar|trocas-e-devolucoes|prazo-e-entrega|politica-de-privacidade(-2)?|termos-de-uso|sample-page|newsletter)/?(\?.*)?$) {
    return 301 https://ciadasmochilas.com.br$request_uri;
}


# ============================================================================
# SECTION 2: Aliases canonicos (URLs amigaveis -> URLs reais do WC)
# ============================================================================
# Espelha:
#   * src/lib/sso-bridge.ts (LOJA_ALIASES) na vitrine
#   * public/_redirects (CF Pages) na vitrine
# SEMPRE atualizar os tres juntos quando adicionar/mudar alias.
# ============================================================================

# Favoritos (Wishlist) — endpoint custom WC esta dentro de /minha-conta/
if ($request_uri = /favoritos) { return 301 https://loja.ciadasmochilas.com.br/minha-conta/favoritos/; }
if ($request_uri = /wishlist) { return 301 https://loja.ciadasmochilas.com.br/minha-conta/favoritos/; }
if ($request_uri = /my-wishlist) { return 301 https://loja.ciadasmochilas.com.br/minha-conta/favoritos/; }

# Checkout — alias EN-style pra slug PT-BR
if ($request_uri = /checkout) { return 301 https://loja.ciadasmochilas.com.br/finalizar-compra/; }

# Rastreio de pedido — aliases curtos / EN
if ($request_uri = /rastrear) { return 301 https://loja.ciadasmochilas.com.br/rastrear-pedido/; }
if ($request_uri = /rastreio) { return 301 https://loja.ciadasmochilas.com.br/rastrear-pedido/; }
if ($request_uri = /track-my-order) { return 301 https://loja.ciadasmochilas.com.br/rastrear-pedido/; }

# Recuperacao de senha — slug do WC e' dentro de minha-conta
if ($request_uri = /esqueci-a-senha) { return 301 https://loja.ciadasmochilas.com.br/minha-conta/esqueci-a-senha/; }
if ($request_uri = /recuperar-senha) { return 301 https://loja.ciadasmochilas.com.br/minha-conta/esqueci-a-senha/; }


# ============================================================================
# SECTION 3: O que NAO esta aqui (intencional)
# ============================================================================
#
# As URLs abaixo NAO sao interceptadas por este arquivo — caem na config
# padrao do WordOps que serve o WP normalmente:
#
#   * /                     (home da loja — pode redirect futuro pra vitrine)
#   * /carrinho/*           (WC cart)
#   * /finalizar-compra/*   (WC checkout)
#   * /minha-conta/*        (WC my-account + sub-endpoints)
#   * /rastrear-pedido/*    (WC track order)
#   * /wp-json/*            (REST API)
#   * /wp-admin/*           (back-office)
#   * /wp-login.php         (auth)
#   * /wp-cron.php          (system cron externo chama este endpoint)
#   * /wp-content/*         (uploads, themes, plugins assets)
#   * /wp-includes/*        (core JS/CSS)
#   * /favicon.ico, /robots.txt, /sitemap*.xml
#
# Se algum desses precisar ser bloqueado/redirecionado no futuro, adicionar
# regra apropriada nas secoes 0/1/2 acima.
# ============================================================================
